<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>카드 관리</title>
    <script>
      (() => {
        try {
          const theme = localStorage.getItem("flashcard-theme") === "dark" ? "dark" : "light";
          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = theme;
        } catch {
          document.documentElement.dataset.theme = "light";
          document.documentElement.style.colorScheme = "light";
        }
      })();
    </script>
    <link rel="stylesheet" href="/static/styles/admin.css?v=22" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <div>
            <h1>카드 관리</h1>
            <p id="document-count">카드 데이터베이스</p>
          </div>
          <button id="theme-toggle" class="theme-toggle" type="button" role="switch" aria-checked="false" aria-label="테마 전환">
            <span class="theme-toggle-track" aria-hidden="true">
              <span class="theme-toggle-thumb"></span>
            </span>
            <span class="theme-toggle-text">Light</span>
          </button>
        </div>
        <button id="export-static" class="primary static-save">static에 저장</button>

        <section class="summary-grid" aria-label="카드 요약">
          <div class="metric">
            <span class="metric-label">카드</span>
            <strong id="metric-cards">0</strong>
          </div>
          <div class="metric">
            <span class="metric-label">즐겨찾기</span>
            <strong id="metric-favorites">0</strong>
          </div>
          <div class="metric">
            <span class="metric-label">기출</span>
            <strong id="metric-past-exams">0</strong>
          </div>
          <div class="metric">
            <span class="metric-label">여러 이미지</span>
            <strong id="metric-multi">0</strong>
          </div>
        </section>

        <section class="filter-panel" aria-label="카드 필터">
          <label>
            검색
            <input id="query" type="search" placeholder="문제, 정답, 메모" />
          </label>
          <div class="filter-row">
            <label>
              단원
              <input id="chapter" inputmode="numeric" placeholder="18" />
            </label>
            <label>
              페이지
              <input id="page" inputmode="numeric" placeholder="61" />
            </label>
          </div>
          <label>
            그림
            <input id="figure" placeholder="18-21" />
          </label>
          <label class="check-row">
            <input id="past-exam-only" type="checkbox" />
            기출만
          </label>
          <label class="check-row">
            <input id="multi-only" type="checkbox" />
            여러 이미지 카드만
          </label>
          <button id="apply-filters" class="filter-apply">필터 적용</button>
        </section>

      </aside>

      <main class="workspace">
        <header class="workspace-header">
          <div>
            <p class="eyebrow">현재 카드</p>
            <h2 id="view-title">카드 관리</h2>
          </div>
          <div class="toolbar">
            <label class="select-label">
              페이지 크기
              <select id="page-size">
                <option value="24" selected>24</option>
                <option value="48">48</option>
                <option value="96">96</option>
              </select>
            </label>
            <button id="merge-selected" class="secondary">선택 병합</button>
            <button id="refresh" class="secondary">새로고침</button>
          </div>
        </header>

        <section id="card-list" class="card-list" aria-live="polite"></section>

        <footer class="pager">
          <div class="pager-nav">
            <button id="prev" class="secondary">이전</button>
            <div id="page-numbers" class="page-numbers" aria-label="페이지 이동"></div>
            <button id="next" class="secondary">다음</button>
          </div>
          <span id="page-label">0</span>
        </footer>
      </main>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="/static/app.js?v=22"></script>
  </body>
</html>
